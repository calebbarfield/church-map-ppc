<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Palmetto Pointe Church Locations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, sans-serif;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    .sidebar {
      position: absolute;
      right: 0;
      top: 0;
      width: 400px;
      height: 100%;
      background: rgba(10,10,10,0.96);
      transform: translateX(100%);
      transition: 0.3s ease;
      padding: 20px;
      overflow-y: auto;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .marker {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0,128,128,0.2);
      border: 2px solid #008080;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(0,128,128,0.6);
      cursor: pointer;
    }

    .marker img {
      width: 22px;
      height: 22px;
    }

    .photo {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 15px;
    }

    .btn {
      display:block;
      margin-top:15px;
      padding:12px;
      text-align:center;
      background:#008080;
      color:white;
      text-decoration:none;
      border-radius:10px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="sidebar" class="sidebar"></div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiY2FsZWJiYXJmaWVsZCIsImEiOiJjbW42NHFjZ24wMjZoMm9wejU4Ymh1bDdlIn0.Gsp9A3u7A675J3dimnFeLA';

const LOGO_URL = 'https://storage1.snappages.site/BBR3GQ/assets/images/23682695_500x500_500.png';

const campuses = [
{
  name:'Palmetto Pointe Church - Myrtle Beach',
  address:'2901 Fantasy Way, Myrtle Beach, SC',
  times:'9am & 11am',
  pastor:'Lead Pastors',
  pastorTitle:'Lead Pastors',
  image:'https://storage1.snappages.site/BBR3GQ/assets/images/14445111_5796x7891_500.jpg',
  link:'https://www.palmettopointechurch.com/myrtlebeach'
},
{
  name:'Palmetto Pointe Church - Socastee',
  address:'4475 Millpond Rd, Myrtle Beach, SC',
  times:'10am',
  pastor:'Thomas & Kylie Grainger',
  pastorTitle:'Campus Pastor',
  image:'https://storage1.snappages.site/BBR3GQ/assets/images/16567429_1024x1533_500.jpeg',
  link:'https://palmettopointechurch.com/socastee'
},
{
  name:'Palmetto Pointe Church - Aynor',
  address:'243 8th Ave, Aynor, SC',
  times:'10am',
  pastor:'Samson & Whitney Ahmed',
  pastorTitle:'Campus Pastor',
  image:'https://storage1.snappages.site/BBR3GQ/assets/images/16585417_1024x1672_500.jpeg',
  link:'https://palmettopointechurch.com/aynor'
},
{
  name:'Palmetto Pointe Church - Clemson',
  address:'434 Church St, Pendleton, SC',
  times:'10am',
  pastor:'Mike & Terri Teramano',
  pastorTitle:'Campus Pastor',
  image:'https://storage1.snappages.site/BBR3GQ/assets/images/16585377_1024x1833_500.jpeg',
  link:'https://palmettopointechurch.com/clemson'
},
{
  name:'Palmetto Pointe Church - Southern Illinois',
  address:'1300 Broeking Rd, Marion, IL',
  times:'10am',
  pastor:'Justin & Keturah Dusch',
  pastorTitle:'Campus Pastor',
  image:'https://storage1.snappages.site/BBR3GQ/assets/images/17870209_853x1280_500.JPEG',
  link:'https://palmettopointechurch.com/southernillinois'
}
];

const map = new mapboxgl.Map({
  container:'map',
  style:'mapbox://styles/calebbarfield/cmn64wn1o000601qua68w1xk7',
  center:[-82,35],
  zoom:5
});

const bounds = new mapboxgl.LngLatBounds();

function openSidebar(campus){
  document.getElementById('sidebar').innerHTML = `
    <h2>${campus.name}</h2>
    <img class="photo" src="${campus.image}">
    <p><strong>Location:</strong><br>${campus.address}</p>
    <p><strong>Service Times:</strong><br>${campus.times}</p>
    <p><strong>${campus.pastorTitle}:</strong><br>${campus.pastor}</p>
    <a class="btn" target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(campus.address)}">Get Directions</a>
    <a class="btn" target="_blank" href="${campus.link}">Visit Campus Page</a>
  `;
  document.getElementById('sidebar').classList.add('open');
}

async function geocode(address){
  const res = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(address)}.json?access_token=${mapboxgl.accessToken}`);
  const data = await res.json();
  return data.features[0].center;
}

async function loadMap(){
  for (let campus of campuses){
    const coords = await geocode(campus.address);

    const el = document.createElement('div');
    el.className = 'marker';

    const img = document.createElement('img');
    img.src = LOGO_URL;
    el.appendChild(img);

    el.onclick = ()=>openSidebar(campus);

    new mapboxgl.Marker(el).setLngLat(coords).addTo(map);

    bounds.extend(coords);
  }

  map.fitBounds(bounds,{padding:80});
}

map.on('load', loadMap);
</script>

</body>
</html>
