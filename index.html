<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Palmetto Pointe Church Locations</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet" />

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #0a0a0a;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

#map {
  position: absolute;
  inset: 0;
}

/* Sidebar */
.sidebar {
  position: absolute;
  right: 0;
  top: 0;
  width: 400px;
  max-width: 92vw;
  height: 100%;
  background: rgba(10,10,10,0.96);
  transform: translateX(100%);
  opacity: 0;
  transition: transform 0.35s ease, opacity 0.35s ease;
  overflow-y: auto;
  z-index: 10;
}

.sidebar.open {
  transform: translateX(0);
  opacity: 1;
}

.sidebar-inner {
  padding: 20px;
  position: relative;
}

.close-btn {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 30px;
  height: 30px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  border: none;
  cursor: pointer;
}

.campus-photo {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 14px;
  margin-bottom: 16px;
}

.pastor-photo {
  width: 140px;
  height: 140px;
  border-radius: 14px;
  margin-top: 10px;
}

.marker {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(0,128,128,0.2);
  border: 2px solid #008080;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
}

.marker.active {
  transform: scale(1.2);
  box-shadow:
    0 0 0 10px rgba(0,128,128,0.2),
    0 0 30px rgba(0,128,128,0.9);
}

.marker img {
  width: 22px;
}

.btn {
  display: block;
  margin-top: 12px;
  padding: 12px;
  background: #008080;
  color: white;
  text-align: center;
  border-radius: 10px;
  text-decoration: none;
}

.btn.secondary {
  background: rgba(255,255,255,0.08);
}

/* MOBILE FIX: Bottom sheet */
@media (max-width: 700px) {
  .sidebar {
    top: auto;
    bottom: 0;
    height: 70%;
    width: 100%;
    transform: translateY(100%);
  }

  .sidebar.open {
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div id="map"></div>
<div id="sidebar" class="sidebar"></div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiY2FsZWJiYXJmaWVsZCIsImEiOiJjbW42NHFjZ24wMjZoMm9wejU4Ymh1bDdlIn0.Gsp9A3u7A675J3dimnFeLA';

const LOGO_URL = 'https://storage1.snappages.site/BBR3GQ/assets/images/23682695_500x500_500.png';
const PLAN_VISIT_URL = 'https://api.leadconnectorhq.com/widget/form/ty8x2qnVQoZnP9hIAywD';

/* PRE-DEFINED COORDS (NO GEOCODING) */
const campuses = [
  {
    name: 'Myrtle Beach',
    coords: [-78.8857, 33.6891],
    address: '2901 Fantasy Way, Myrtle Beach, SC',
    times: '9am & 11am',
    pastor: 'Jamie & Maddie Barfield',
    campusPhoto: 'https://storage1.snappages.site/BBR3GQ/assets/images/23695999_1920x1080_2500.png',
    pastorPhoto: 'https://storage1.snappages.site/BBR3GQ/assets/images/23699758_1600x1200_2500.png',
    link: 'https://www.palmettopointechurch.com/myrtlebeach'
  },
  {
    name: 'Socastee',
    coords: [-78.9982, 33.6842],
    address: '4475 Millpond Rd, Myrtle Beach, SC',
    times: '10am',
    pastor: 'Thomas & Kylie Grainger',
    campusPhoto: 'https://storage1.snappages.site/BBR3GQ/assets/images/23696004_1920x1080_2500.png',
    pastorPhoto: 'https://storage1.snappages.site/BBR3GQ/assets/images/23699738_1600x1200_2500.png',
    link: 'https://palmettopointechurch.com/socastee'
  },
  {
    name: 'Aynor',
    coords: [-79.2048, 33.9974],
    address: '243 8th Ave, Aynor, SC',
    times: '10am',
    pastor: 'Samson & Whitney Ahmed',
    campusPhoto: 'https://storage1.snappages.site/BBR3GQ/assets/images/23696009_1920x1080_2500.png',
    pastorPhoto: 'https://storage1.snappages.site/BBR3GQ/assets/images/23699748_1600x1200_2500.png',
    link: 'https://palmettopointechurch.com/aynor'
  },
  {
    name: 'Clemson',
    coords: [-82.7826, 34.6515],
    address: '434 Church St, Pendleton, SC',
    times: '10am',
    pastor: 'Mike & Terri Teramano',
    campusPhoto: 'https://storage1.snappages.site/BBR3GQ/assets/images/23696014_1920x1080_2500.png',
    pastorPhoto: 'https://storage1.snappages.site/BBR3GQ/assets/images/23699743_1600x1200_2500.png',
    link: 'https://palmettopointechurch.com/clemson'
  },
  {
    name: 'Southern Illinois',
    coords: [-89.0937, 37.7306],
    address: '1300 Broeking Rd, Marion, IL',
    times: '10am',
    pastor: 'Justin & Keturah Dusch',
    campusPhoto: 'https://storage1.snappages.site/BBR3GQ/assets/images/23696019_1920x1080_2500.png',
    pastorPhoto: 'https://storage1.snappages.site/BBR3GQ/assets/images/23699753_1600x1200_2500.png',
    link: 'https://palmettopointechurch.com/southernillinois'
  }
];

/* PRELOAD IMAGES */
campuses.forEach(c => {
  new Image().src = c.campusPhoto;
  if (c.pastorPhoto) new Image().src = c.pastorPhoto;
});

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/dark-v11',
  center: [-82, 35],
  zoom: 5.5
});

const bounds = new mapboxgl.LngLatBounds();
let markers = [];

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
}

function openSidebar(campus, el) {
  document.querySelectorAll('.marker').forEach(m => m.classList.remove('active'));
  el.classList.add('active');

  document.getElementById('sidebar').innerHTML = `
    <div class="sidebar-inner">
      <button class="close-btn" onclick="closeSidebar()">×</button>
      <h2>${campus.name}</h2>
      <img class="campus-photo" src="${campus.campusPhoto}">
      <p><strong>Location:</strong><br>${campus.address}</p>
      <p><strong>Service Times:</strong><br>${campus.times}</p>
      <p><strong>Pastor:</strong><br>${campus.pastor}</p>
      <img class="pastor-photo" src="${campus.pastorPhoto}">
      <a class="btn" target="_blank" href="${PLAN_VISIT_URL}?campus=${encodeURIComponent(campus.name)}">Plan Your Visit →</a>
      <a class="btn secondary" target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(campus.address)}">Get Directions</a>
      <a class="btn secondary" target="_blank" href="${campus.link}">Visit Campus Page</a>
    </div>
  `;

  document.getElementById('sidebar').classList.add('open');
}

map.on('load', () => {
  campuses.forEach(campus => {
    const el = document.createElement('div');
    el.className = 'marker';

    const img = document.createElement('img');
    img.src = LOGO_URL;
    el.appendChild(img);

    el.onclick = () => openSidebar(campus, el);

    new mapboxgl.Marker(el).setLngLat(campus.coords).addTo(map);
    bounds.extend(campus.coords);
  });

  map.fitBounds(bounds, { padding: 80 });

  setTimeout(() => {
    map.flyTo({ center: bounds.getCenter(), zoom: 6.5, speed: 0.8 });
  }, 800);
});
</script>

</body>
</html>
