<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Palmetto Pointe Church Locations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #map {
      position: absolute;
      inset: 0;
    }

    .sidebar {
      position: absolute;
      right: 0;
      top: 0;
      width: 400px;
      max-width: 92vw;
      height: 100%;
      background: rgba(10, 10, 10, 0.96);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      overflow-y: auto;
      box-shadow: -10px 0 30px rgba(0,0,0,0.25);
      z-index: 10;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-inner {
      padding: 20px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
    }

    .sidebar h2 {
      margin: 0 36px 16px 0;
      font-size: 24px;
    }

    .campus-photo {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 14px;
      margin-bottom: 18px;
    }

    .pastor-photo {
      width: 140px;
      height: 140px;
      object-fit: cover;
      border-radius: 14px;
      margin-top: 10px;
    }

    .marker {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(0,128,128,0.2);
      border: 2px solid #008080;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(0,128,128,0.6);
      cursor: pointer;
    }

    .marker img {
      width: 22px;
    }

    .btn {
      display: block;
      margin-top: 14px;
      padding: 12px;
      text-align: center;
      background: #008080;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
    }

    .btn.secondary {
      background: rgba(255,255,255,0.08);
    }
  </style>
</head>

<body>

<div id="map"></div>
<div id="sidebar" class="sidebar"></div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiY2FsZWJiYXJmaWVsZCIsImEiOiJjbW42NHFjZ24wMjZoMm9wejU4Ymh1bDdlIn0.Gsp9A3u7A675J3dimnFeLA';

const LOGO_URL = 'https://storage1.snappages.site/BBR3GQ/assets/images/23682695_500x500_500.png';
const PLAN_VISIT_URL = 'https://api.leadconnectorhq.com/widget/form/ty8x2qnVQoZnP9hIAywD';

const campuses = [
{
  name:'Myrtle Beach',
  address:'2901 Fantasy Way, Myrtle Beach, SC',
  times:'9am & 11am',
  pastor:'Lead Pastors',
  pastorTitle:'Lead Pastors',
  campusPhoto:'https://storage1.snappages.site/BBR3GQ/assets/images/23695999_1920x1080_2500.png',
  pastorPhoto:'https://storage1.snappages.site/BBR3GQ/assets/images/14445111_5796x7891_500.jpg',
  link:'https://www.palmettopointechurch.com/myrtlebeach'
},
{
  name:'Socastee',
  address:'4475 Millpond Rd, Myrtle Beach, SC',
  coords:[-78.9982,33.6842],
  times:'10am',
  pastor:'Thomas & Kylie Grainger',
  pastorTitle:'Campus Pastor',
  campusPhoto:'https://storage1.snappages.site/BBR3GQ/assets/images/23696004_1920x1080_2500.png',
  pastorPhoto:'https://storage1.snappages.site/BBR3GQ/assets/images/16567429_1024x1533_500.jpeg',
  link:'https://palmettopointechurch.com/socastee'
},
{
  name:'Aynor',
  address:'243 8th Ave, Aynor, SC',
  times:'10am',
  pastor:'Samson & Whitney Ahmed',
  pastorTitle:'Campus Pastor',
  campusPhoto:'https://storage1.snappages.site/BBR3GQ/assets/images/23696009_1920x1080_2500.png',
  pastorPhoto:'https://storage1.snappages.site/BBR3GQ/assets/images/16585417_1024x1672_500.jpeg',
  link:'https://palmettopointechurch.com/aynor'
},
{
  name:'Clemson',
  address:'434 Church St, Pendleton, SC',
  times:'10am',
  pastor:'Mike & Terri Teramano',
  pastorTitle:'Campus Pastor',
  campusPhoto:'https://storage1.snappages.site/BBR3GQ/assets/images/23696014_1920x1080_2500.png',
  pastorPhoto:'https://storage1.snappages.site/BBR3GQ/assets/images/16585377_1024x1833_500.jpeg',
  link:'https://palmettopointechurch.com/clemson'
},
{
  name:'Southern Illinois',
  address:'1300 Broeking Rd, Marion, IL',
  times:'10am',
  pastor:'Justin & Keturah Dusch',
  pastorTitle:'Campus Pastor',
  campusPhoto:'https://storage1.snappages.site/BBR3GQ/assets/images/23696019_1920x1080_2500.png',
  pastorPhoto:'https://storage1.snappages.site/BBR3GQ/assets/images/17870209_853x1280_500.JPEG',
  link:'https://palmettopointechurch.com/southernillinois'
}
];

const map = new mapboxgl.Map({
  container:'map',
  style:'mapbox://styles/calebbarfield/cmn64wn1o000601qua68w1xk7',
  center:[-82,35],
  zoom:5
});

const bounds = new mapboxgl.LngLatBounds();

function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
}

function openSidebar(c){
  document.getElementById('sidebar').innerHTML=`
    <div class="sidebar-inner">
      <button class="close-btn" onclick="closeSidebar()">×</button>
      <h2>${c.name}</h2>
      <img class="campus-photo" src="${c.campusPhoto}">
      <p><strong>Location:</strong><br>${c.address}</p>
      <p><strong>Service Times:</strong><br>${c.times}</p>
      <p><strong>Childcare:</strong><br>This campus offers childcare for children ages birth through 5th grade.</p>
      <p><strong>${c.pastorTitle}:</strong><br>${c.pastor}</p>
      <img class="pastor-photo" src="${c.pastorPhoto}">
      <a class="btn" target="_blank" href="${PLAN_VISIT_URL}">Plan Your Visit This Sunday →</a>
      <a class="btn secondary" target="_blank" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.address)}">Get Directions</a>
      <a class="btn secondary" target="_blank" href="${c.link}">Visit Campus Page</a>
    </div>
  `;
  document.getElementById('sidebar').classList.add('open');
}

async function geocode(a){
  const r=await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(a)}.json?access_token=${mapboxgl.accessToken}`);
  const d=await r.json();
  return d.features[0].center;
}

async function loadMap(){
  for(let c of campuses){
    const coords=c.coords||await geocode(c.address);

    const el=document.createElement('div');
    el.className='marker';

    const img=document.createElement('img');
    img.src=LOGO_URL;
    el.appendChild(img);

    el.onclick=()=>openSidebar(c);

    new mapboxgl.Marker(el).setLngLat(coords).addTo(map);

    bounds.extend(coords);
  }

  map.fitBounds(bounds,{padding:80});
}

map.on('load',loadMap);
</script>

</body>
</html>
